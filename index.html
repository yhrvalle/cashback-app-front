<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Sistema de Cashback - Nology</title>
</head>
<body>

    <h2>Calculadora de Cashback</h2>
    
    <div class="card">
        <div class="form-group">
            <label>Valor Bruto da Compra (R$):</label>
            <input type="number" id="valor" placeholder="Ex: 600" step="0.01">
        </div>
        <div class="form-group">
            <label>Desconto (%):</label>
            <input type="number" id="desconto" placeholder="Ex: 20" step="1">
        </div>
        <div class="form-group">
            <label>Cliente VIP</label>
            <select id="tipo">
                <option value=false>Comum</option>
                <option value=true>VIP</option>
            </select>
        </div>
        <button onclick="calcularCashback()">Calcular e Salvar</button>
        <div id="resultado"></div>
    </div>

    <h3>Meu Histórico (IP Local)</h3>
    <table id="tabela-historico">
        <thead>
            <tr>
                <th>Data</th>
                <th>Valor Pago</th>
                <th>Valor Descontado</th>
                <th>Desconto</th>
                <th>Cliente Vip</th>
                <th>Cashback</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        const API_URL = "https://cashback-app-backend.onrender.com";
        //const API_URL = "http://localhost:8000"
        async function carregarHistorico() {
            try {
                const response = await fetch(`${API_URL}/historico`);
                const dados = await response.json();
                const tbody = document.querySelector("#tabela-historico tbody");
                tbody.innerHTML = "";

                dados.forEach(item => {
                    let dataObjeto = new Date(item.data_criacao)
                    if (!item.data_criacao.includes('Z') && !item.data_criacao.includes('+'))
                    {
                        dataObjeto = new Date(item.data_criacao + "Z");
                    }
                    const data_formatada = dataObjeto.toLocaleString('pt-br', { 
                        timeZone: "America/Sao_Paulo"
                    });
                    tbody.innerHTML += `
                        <tr>
                            <td>${data_formatada}</td>
                            <td>R$ ${item.valor_compra.toFixed(2)}</td>
                            <td>R$ ${item.valor_descontado.toFixed(2)}</td>
                            <td>${item.desconto}%</td>
                            <td>${item.cliente_vip ? 'VIP' : 'Comum'}</td>
                            <td>R$ ${item.valor_cashback.toFixed(2)}</td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Erro ao carregar histórico:", error);
            }
        }

        async function calcularCashback() {
           
            const valorRaw = document.getElementById("valor").value || "0";
            const descontoRaw = document.getElementById("desconto").value || "0";
            const tipoRaw = document.getElementById("tipo").value;
            
            const valoresAceitos = ["false", "true"]
            if (!valoresAceitos.includes(tipoRaw)) return alert("Insira um valor válido para o tipo de cliente")
            
            const cliente_vip = (tipoRaw === "true");

            // limite do decimal é 10 ^ 8
            if (parseFloat(valorRaw) <= 0 || parseFloat(valorRaw) >= 100000000) return alert("Insira um valor de compra válido!");
            if (parseFloat(descontoRaw) > 100 || parseFloat(descontoRaw) < 0) return alert("Insira um valor de desconto válido!");

            try {
                const response = await fetch(`${API_URL}/calcular`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        valor: parseFloat(valorRaw), 
                        desconto: parseFloat(descontoRaw), 
                        cliente_vip: cliente_vip
                    })
                });

                const res = await response.json();
                if (res.status === "sucesso") {
                    document.getElementById("resultado").innerText = `Cashback Gerado: R$ ${res.cashback.toFixed(2)}`;
                    carregarHistorico();
                }
            } catch (error) {
                alert("Erro ao conectar com a API!");
            }
        }

        
        carregarHistorico();
    </script>
</body>
</html>
